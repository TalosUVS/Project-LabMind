<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#iconGradient)"/>
  
  <!-- Chip Body -->
  <rect x="34" y="34" width="60" height="60" rx="8" fill="#ffffff" opacity="0.95"/>
  
  <!-- Chip Pins -->
  <g fill="#06b6d4">
    <!-- Left -->
    <rect x="24" y="42" width="10" height="4" rx="1"/>
    <rect x="24" y="52" width="10" height="4" rx="1"/>
    <rect x="24" y="62" width="10" height="4" rx="1"/>
    <rect x="24" y="72" width="10" height="4" rx="1"/>
    <rect x="24" y="82" width="10" height="4" rx="1"/>
    
    <!-- Right -->
    <rect x="94" y="42" width="10" height="4" rx="1"/>
    <rect x="94" y="52" width="10" height="4" rx="1"/>
    <rect x="94" y="62" width="10" height="4" rx="1"/>
    <rect x="94" y="72" width="10" height="4" rx="1"/>
    <rect x="94" y="82" width="10" height="4" rx="1"/>
    
    <!-- Top -->
    <rect x="42" y="24" width="4" height="10" rx="1"/>
    <rect x="52" y="24" width="4" height="10" rx="1"/>
    <rect x="62" y="24" width="4" height="10" rx="1"/>
    <rect x="72" y="24" width="4" height="10" rx="1"/>
    <rect x="82" y="24" width="4" height="10" rx="1"/>
    
    <!-- Bottom -->
    <rect x="42" y="94" width="4" height="10" rx="1"/>
    <rect x="52" y="94" width="4" height="10" rx="1"/>
    <rect x="62" y="94" width="4" height="10" rx="1"/>
    <rect x="72" y="94" width="4" height="10" rx="1"/>
    <rect x="82" y="94" width="4" height="10" rx="1"/>
  </g>
  
  <!-- Circuit Pattern -->
  <rect x="44" y="44" width="40" height="40" rx="4" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  
  <!-- AI Neural Network Center -->
  <g opacity="0.9">
    <!-- Outer nodes -->
    <circle cx="54" cy="54" r="2.5" fill="#6366f1"/>
    <circle cx="74" cy="54" r="2.5" fill="#6366f1"/>
    <circle cx="54" cy="74" r="2.5" fill="#6366f1"/>
    <circle cx="74" cy="74" r="2.5" fill="#6366f1"/>
    
    <!-- Center node -->
    <circle cx="64" cy="64" r="3.5" fill="#06b6d4" filter="url(#iconGlow)"/>
    
    <!-- Connections -->
    <line x1="54" y1="54" x2="64" y2="64" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <line x1="74" y1="54" x2="64" y2="64" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <line x1="54" y1="74" x2="64" y2="64" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <line x1="74" y1="74" x2="64" y2="64" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Corner Markers -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <path d="M 16 24 L 16 16 L 24 16"/>
    <path d="M 104 16 L 112 16 L 112 24"/>
    <path d="M 112 104 L 112 112 L 104 112"/>
    <path d="M 24 112 L 16 112 L 16 104"/>
  </g>
</svg>
